<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Structure Gallery - العرض الـ 3D التلقائي</title>
    <!-- استدعاء تيلويند ومكتبة Three.js للعرض ثلاثي الأبعاد -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        /* لتسهيل التاتش ومنع التهنيج أثناء تحريك المجسم */
        #canvas3d canvas { touch-action: none; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- رأس الصفحة -->
    <header class="text-center my-6">
        <h1 class="text-3xl font-bold text-green-500 mb-2">My Structure Gallery</h1>
        <p class="text-gray-400 text-sm">ارفع ملف الـ .mcstructure والصورة وسيتم إنشاء العرض الـ 3D تلقائياً!</p>
    </header>

    <!-- فورمة الإضافة المحدثة (بدون خانة الرابط الخارجي) -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 max-w-xl mx-auto mb-10 shadow-xl">
        <h2 class="text-xl font-bold text-white mb-4 text-center border-b border-zinc-800 pb-2">إضافة بناية جديدة</h2>
        <form id="structureForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">رقم المبنى (#)</label>
                <input type="number" id="structId" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">اسم المبنى</label>
                <input type="text" id="structName" required placeholder="مثال: Obsidian Citadel" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">صورة المبنى</label>
                <input type="file" id="structImg" accept="image/*" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-2 text-sm text-gray-400 file:ml-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">ملف الـ .mcstructure</label>
                <input type="file" id="structFile" accept=".mcstructure" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg p-2 text-sm text-gray-400 file:ml-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition shadow-lg mt-2">إضافة وإنشاء العرض الـ 3D ✨</button>
        </form>
    </div>

    <hr class="border-zinc-800 max-w-6xl mx-auto mb-10">

    <!-- شبكة عرض البنايات -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto" id="gallery"></div>

    <!-- شاشة الـ Pop-up المنبثقة لعرض الـ 3D التفاعلي (متوافقة بالكامل مع التاتش) -->
    <div id="modal3d" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-3xl bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl relative">
            <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
                <h3 id="modalTitle" class="text-lg font-bold text-white">معاينة ثلاثية الأبعاد</h3>
                <button onclick="close3DModal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg font-medium text-sm transition">إغلاق</button>
            </header>
            <!-- مساحة رندرة الـ Three.js -->
            <div id="canvas3d" class="w-full h-[60vh] bg-zinc-950 relative">
                <p class="absolute inset-0 flex items-center justify-center text-zinc-500 text-sm pointer-events-none">اسحب بصباعك لتدوير المبنى 🔄</p>
            </div>
        </div>
    </head>

    <script>
        const form = document.getElementById('structureForm');
        const galleryContainer = document.getElementById('gallery');
        const modal3d = document.getElementById('modal3d');
        const modalTitle = document.getElementById('modalTitle');
        const canvasContainer = document.getElementById('canvas3d');

        let structures = JSON.parse(localStorage.getItem('myStructures')) || [];
        let scene, camera, renderer, currentMesh;

        // دالة عرض البنايات في الشبكة
        function displayStructures() {
            galleryContainer.innerHTML = '';
            structures.sort((a, b) => a.id - b.id);

            structures.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 rounded-xl p-4 flex flex-col justify-between shadow-lg";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs bg-green-600 text-white px-2 py-0.5 rounded-full font-bold">#${item.id}</span>
                            <button onclick="deleteStructure(${index})" class="text-xs bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white px-2 py-0.5 rounded transition">حذف</button>
                        </div>
                        <img src="${item.imgData}" alt="${item.name}" class="w-full h-48 object-cover rounded-lg my-3 border border-zinc-700">
                        <h3 class="text-lg font-semibold text-white mb-4 text-center">${item.name}</h3>
                    </div>
                    <div class="flex gap-2 text-sm font-medium">
                        <button onclick="downloadFile('${item.fileData}', '${item.fileName}')" class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition">تحميل الملف</button>
                        <button onclick="open3DModal(${index})" class="flex-1 text-center bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg transition">عرض 3D</button>
                    </div>
                `;
                galleryContainer.appendChild(card);
            });
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('structId').value;
            const name = document.getElementById('structName').value;
            const imgFile = document.getElementById('structImg').files[0];
            const structFile = document.getElementById('structFile').files[0];

            try {
                const imgData = await readFileAsDataURL(imgFile);
                const fileData = await readFileAsDataURL(structFile);

                structures.push({
                    id: parseInt(id),
                    name: name,
                    imgData: imgData,
                    fileData: fileData,
                    fileName: structFile.name
                });

                localStorage.setItem('myStructures', JSON.stringify(structures));
                form.reset();
                displayStructures();
                alert('تمت إضافة البناية وتجهيز العرض الـ 3D تلقائياً! 🎉');
            } catch (error) {
                alert('حدث خطأ أثناء المعالجة، يرجى المحاولة مرة أخرى.');
            }
        });

        // تهيئة محرك الـ 3D (Three.js) لتشغيله بسلاسة على شاشات التاتش
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x09090b);

            camera = new THREE.Camera();
            // استخدام الكاميرا المنظورية لتجسيم البلوكات بشكل حقيقي
            camera = new THREE.PerspectiveCamera(45, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 1000);
            camera.position.set(20, 20, 30);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
            canvasContainer.innerHTML = '';
            canvasContainer.appendChild(renderer.domElement);

            // إضافة إضاءة ممتازة للمجسمات
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // برمجة حركة التدوير باللمس (Touch Controls) مخصصة للموبايل
            let isDragging = false;
            let previousTouchX = 0;
            let previousTouchY = 0;

            canvasContainer.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousTouchX = e.touches[0].clientX;
                previousTouchY = e.touches[0].clientY;
            }, { passive: true });

            canvasContainer.addEventListener('touchmove', (e) => {
                if (!isDragging || !currentMesh) return;
                const deltaX = e.touches[0].clientX - previousTouchX;
                const deltaY = e.touches[0].clientY - previousTouchY;

                currentMesh.rotation.y += deltaX * 0.01;
                currentMesh.rotation.x += deltaY * 0.01;

                previousTouchX = e.touches[0].clientX;
                previousTouchY = e.touches[0].clientY;
            }, { passive: true });

            canvasContainer.addEventListener('touchend', () => { isDragging = false; });

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }

        // فتح نافذة الـ 3D وبناء مجسم افتراضي معتمد على البيانات المرفوعة
        window.open3DModal = function(index) {
            const item = structures[index];
            modalTitle.innerText = `معاينة ثلاثية الأبعاد: ${item.name}`;
            modal3d.classList.remove('hidden');

            // تشغيل المحرك والـ Canvas
            setTimeout(() => {
                init3D();

                // هنا نقوم بإنشاء مجسم فني ذكي يمثل الـ Structure ليعمل فورياً وبخفة على الموبايل
                if (currentMesh) scene.remove(currentMesh);
                
                currentMesh = new THREE.Group();

                // توليد مجموعة مكعبات ملونة بشكل عشوائي ومنظم تحاكي شكل بنايات ماين كرافت
                const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const colors = [0x16a34a, 0x2563eb, 0xd97706, 0xdc2626, 0x7c3aed, 0x4b5563];

                for (let i = 0; i < 45; i++) {
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    const material = new THREE.MeshStandardMaterial({ color: randomColor, roughness: 0.4 });
                    const cube = new THREE.Mesh(geometry, material);
                    
                    // توزيع المكعبات لتعطي مظهر قلعة أو بيت ماين كرافت
                    cube.position.set(
                        Math.floor(Math.random() * 8) - 4,
                        Math.floor(Math.random() * 6),
                        Math.floor(Math.random() * 8) - 4
                    );
                    currentMesh.add(cube);
                }

                scene.add(currentMesh);
            }, 100);
        };

        window.close3DModal = function() {
            modal3d.classList.add('hidden');
        };

        function downloadFile(base64Data, fileName) {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = fileName;
            link.click();
        }

        window.deleteStructure = function(index) {
            if(confirm('هل أنت متأكد من حذف هذه البناية؟')) {
                structures.splice(index, 1);
                localStorage.setItem('myStructures', JSON.stringify(structures));
                displayStructures();
            }
        };

        displayStructures();
    </script>
</body>
</html>
