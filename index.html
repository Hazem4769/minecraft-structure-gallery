<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Structure Hub & Gallery (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <!-- شحن مكتبات جوجل السحابية -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0b0f; color: #f4f4f7; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #12121a; }
        ::-webkit-scrollbar-thumb { background: #2f2f3d; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 antialiased">

    <!-- Cloud Sync Topbar -->
    <div class="max-w-6xl mx-auto mb-4 flex justify-end">
        <button id="authBtn" onclick="handleAuthClick()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded-xl transition shadow-lg flex items-center gap-2">
            🔄 Connect Google Drive
        </button>
    </div>

    <!-- Dashboard Header & Stats -->
    <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-zinc-800 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-500 bg-clip-text text-transparent">Cloud Structure Gallery</h1>
            <p class="text-zinc-400 text-sm mt-1">Your assets are permanently synced with your Google Drive secure cloud</p>
        </div>
        <div class="flex items-center gap-4 bg-zinc-900/50 border border-zinc-800/80 rounded-2xl px-5 py-3 self-start md:self-auto">
            <div>
                <p class="text-xs text-zinc-500 uppercase tracking-wider font-semibold">Cloud Builds</p>
                <p id="statsCount" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Control Form -->
        <section class="lg:col-span-1">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 sticky top-6 shadow-2xl">
                <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                    <h2 id="formTitle" class="text-lg font-bold text-white flex items-center gap-2">
                        <span id="statusIndicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> Upload to Cloud
                    </h2>
                    <button id="cancelEditBtn" onclick="resetFormState()" class="hidden text-xs text-zinc-400 hover:text-white bg-zinc-800 px-2 py-1 rounded">Cancel</button>
                </div>
                
                <form id="structureForm" class="space-y-4">
                    <input type="hidden" id="editIndex" value="">
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Structure Number / ID</label>
                        <input type="number" id="structId" required placeholder="e.g., 1" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Structure Name</label>
                        <input type="text" id="structName" required placeholder="e.g., Obsidian Citadel" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Display Image Cover</label>
                        <input type="file" id="structImg" accept="image/*" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-xs text-zinc-500 file:mr-3 file:py-1 file:px-2.5 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-emerald-600/20 file:text-emerald-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Minecraft .mcstructure File</label>
                        <input type="file" id="structFile" accept=".mcstructure" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-xs text-zinc-500 file:mr-3 file:py-1 file:px-2.5 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-600/20 file:text-blue-400">
                    </div>
                    <button type="submit" id="submitBtn" disabled class="w-full bg-zinc-700 text-zinc-400 cursor-not-allowed font-semibold py-3 px-4 rounded-xl transition shadow-lg flex justify-center items-center gap-2 mt-2">
                        Connect Drive First
                    </button>
                </form>
            </div>
        </section>

        <!-- Gallery Section -->
        <section class="lg:col-span-2 space-y-6">
            <div class="bg-zinc-900/40 border border-zinc-800/80 rounded-2xl p-3">
                <input type="text" id="searchBar" oninput="displayStructures()" placeholder="Search cloud gallery..." class="w-full bg-zinc-950 border border-zinc-800/60 rounded-xl p-2.5 px-4 text-sm text-white focus:outline-none focus:border-zinc-700 transition">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="gallery">
                <div class="col-span-full py-12 text-center text-zinc-500 text-sm">Please log in to load cloud assets.</div>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="imageModal" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col items-center justify-center p-4" onclick="closeImageModal()">
        <img id="expandedImg" src="" class="max-w-4xl max-h-[85vh] object-contain rounded-xl">
    </div>

    <script>
        // دمج مفاتيح الربط الخاصة بك هنا تلقائياً لمنع أي أخطاء تعديل
        const CLIENT_ID = '685022171093-l41q3uc7h19g8023ujvp9540qugkh4kj.apps.googleusercontent.com'; 
        const API_KEY = 'AlzaSyBqKDR9DBsalWv57_2EyciVdeMHmjtinz8';
        
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;
        let accessToken = null;
        let folderId = null;
        let manifestFileId = null;
        let structures = [];

        const form = document.getElementById('structureForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusIndicator = document.getElementById('statusIndicator');

        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }
        function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => { if (resp.error) return; accessToken = resp.access_token; onAuthSuccess(); } }); }
        function handleAuthClick() { if (accessToken === null) { tokenClient.requestAccessToken({prompt: 'consent'}); } }

        async function onAuthSuccess() {
            document.getElementById('authBtn').innerText = "✅ Cloud Connected";
            document.getElementById('authBtn').className = "bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-xl";
            statusIndicator.className = "w-2 h-2 rounded-full bg-emerald-500";
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish to Cloud";
            submitBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg";
            
            await initCloudFolder();
        }

        async function initCloudFolder() {
            let res = await gapi.client.drive.files.list({ q: "name='Minecraft_Structures_Gallery' and mimeType='application/vnd.google-apps.folder' and trashed=false" });
            if (res.result.files.length > 0) {
                folderId = res.result.files[0].id;
                let metaRes = await gapi.client.drive.files.list({ q: `name='gallery_manifest.json' and '${folderId}' in parents and trashed=false` });
                if (metaRes.result.files.length > 0) {
                    manifestFileId = metaRes.result.files[0].id;
                    let fileData = await gapi.client.drive.files.get({ fileId: manifestFileId, alt: 'media' });
                    structures = fileData.result;
                }
            } else {
                let folderMeta = { name: 'Minecraft_Structures_Gallery', mimeType: 'application/vnd.google-apps.folder' };
                let folder = await gapi.client.drive.files.create({ resource: folderMeta, fields: 'id' });
                folderId = folder.result.id;
            }
            displayStructures();
        }

        async function uploadToDrive(file, customName) {
            const boundary = '321MinecraftSync321';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";
            const reader = new FileReader();
            
            return new Promise((resolve) => {
                reader.onload = async function(e) {
                    const base64Data = btoa(reader.result);
                    const metadata = { name: customName || file.name, parents: [folderId] };
                    const multipartRequestBody = delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) + delimiter + 'Content-Transfer-Encoding: base64\r\n\r\n' + base64Data + close_delim;
                    
                    let response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'multipart/related; boundary=' + boundary },
                        body: multipartRequestBody
                    });
                    let json = await response.json();
                    resolve(json.id);
                };
                reader.readAsBinaryString(file);
            });
        }

        async function saveManifestCloud() {
            const boundary = '321ManifestSync321';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";
            const metadata = { name: 'gallery_manifest.json', parents: [folderId] };
            const multipartRequestBody = delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) + delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(structures) + close_delim;

            if (manifestFileId) {
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${manifestFileId}?uploadType=media`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify(structures)
                });
            } else {
                let response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'multipart/related; boundary=' + boundary },
                    body: multipartRequestBody
                });
                let json = await response.json();
                manifestFileId = json.id;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.innerText = "Uploading to Cloud...";
            submitBtn.disabled = true;

            const id = parseInt(document.getElementById('structId').value);
            const name = document.getElementById('structName').value;
            const imgInput = document.getElementById('structImg').files[0];
            const fileInput = document.getElementById('structFile').files[0];

            if(structures.some(s => s.id === id)) { alert("ID configuration duplicate detected."); return; }

            let cloudImgId = await uploadToDrive(imgInput, `img_${id}_${Date.now()}`);
            let cloudFileId = await uploadToDrive(fileInput, fileInput.name);

            structures.push({ id, name, cloudImgId, cloudFileId, fileName: fileInput.name });
            await saveManifestCloud();
            
            form.reset();
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish to Cloud";
            displayStructures();
        });

        function displayStructures() {
            const galleryContainer = document.getElementById('gallery');
            galleryContainer.innerHTML = '';
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = structures.filter(s => s.name.toLowerCase().includes(query) || s.id.toString().includes(query));
            
            document.getElementById('statsCount').innerText = structures.length;

            if (filtered.length === 0) {
                galleryContainer.innerHTML = `<div class="col-span-full py-12 text-center text-zinc-600 text-sm">No cloud assets found.</div>`;
                return;
            }

            filtered.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900/60 border border-zinc-800/80 rounded-2xl p-4 flex flex-col justify-between hover:border-zinc-700/60 transition shadow-md";
                const imgUrl = `https://lh3.googleusercontent.com/d/${item.cloudImgId}=s400`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs bg-zinc-800 text-zinc-300 px-2.5 py-1 rounded-lg font-bold">#${item.id}</span>
                            <button onclick="deleteStructure(${item.id})" class="text-xs bg-red-950/40 hover:bg-red-950 text-red-400 px-2.5 py-1 rounded-lg transition">Delete</button>
                        </div>
                        <div class="overflow-hidden rounded-xl h-40 border border-zinc-800 bg-zinc-950" onclick="openImageModal('${imgUrl}')">
                            <img src="${imgUrl}" alt="${item.name}" class="w-full h-full object-cover cursor-zoom-in" onerror="this.src='https://placehold.co/400x300/12121a/666?text=Cloud+Preview'">
                        </div>
                        <h3 class="text-base font-bold text-white mt-3 truncate">${item.name}</h3>
                        <p class="text-xs text-zinc-500 font-mono mt-1 mb-4 truncate block">📂 ${item.fileName}</p>
                    </div>
                    <div class="flex gap-2 text-xs font-semibold">
                        <button onclick="downloadCloudFile('${item.cloudFileId}')" class="flex-1 text-center bg-zinc-800 hover:bg-zinc-700 text-zinc-200 py-2.5 rounded-xl transition">Download</button>
                        <button onclick="open3DViewer('${item.cloudFileId}')" class="flex-1 text-center bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl transition">View 3D</button>
                    </div>
                `;
                galleryContainer.appendChild(card);
            });
        }

        window.downloadCloudFile = function(fileId) { window.open(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`, '_blank'); };
        
        window.open3DViewer = function(fileId) {
            window.open("https://bloxelizer.com/", "_blank");
            window.open(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`, '_self');
        };

        window.deleteStructure = async function(id) {
            if(confirm('Remove asset from cloud storage?')) {
                let item = structures.find(s => s.id === id);
                try {
                    await gapi.client.drive.files.delete({ fileId: item.cloudImgId });
                    await gapi.client.drive.files.delete({ fileId: item.cloudFileId });
                } catch(e){}
                structures = structures.filter(s => s.id !== id);
                await saveManifestCloud();
                displayStructures();
            }
        };

        window.openImageModal = function(src) { document.getElementById('expandedImg').src = src; document.getElementById('imageModal').classList.remove('hidden'); };
        window.closeImageModal = function() { document.getElementById('imageModal').classList.add('hidden'); };
    </script>
</body>
</html>
